name: nix eval all hosts

# Eval tripwire: every host's system.build.toplevel must EVALUATE on
# every change.  Catches nixpkgs option deprecations/renames the day
# they land in a lock bump, instead of at deploy time on the affected
# host.  Eval only — nothing is built, so darwin hosts check fine from
# a linux runner.

on:
  push:
    paths:
      - "nix-config/**"
      - ".github/workflows/nix-eval.yml"
  pull_request:
    paths:
      - "nix-config/**"
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16

      - name: Evaluate every host
        run: |
          set -u
          cd nix-config
          fail=0
          for attr in nixosConfigurations darwinConfigurations; do
            for host in $(nix eval --json ".#$attr" --apply builtins.attrNames | jq -r '.[]'); do
              echo "::group::$attr.$host"
              if nix eval ".#$attr.$host.config.system.build.toplevel" --apply 'x: x.outPath'; then
                echo "OK: $host"
              else
                echo "::error title=eval failed::$attr.$host failed to evaluate"
                fail=1
              fi
              echo "::endgroup::"
            done
          done
          exit $fail

      - name: Work-laptop isolation tripwire
        # mac-work must never receive personal tooling.  Two layers:
        # option assertions (catches activation-script installs like
        # jobdrop that never appear in home.packages) and a package-name
        # denylist (catches raw home.packages additions that bypass the
        # module options entirely).  See profiles/home/work.nix for the
        # policy this enforces.
        run: |
          set -u
          cd nix-config
          fail=0

          echo "::group::option assertions"
          for opt in \
            modules.ai.jobdrop.enable \
            modules.ai.opencode.enable \
            modules.ai.kimi-cli.enable \
            modules.ai.mcp-servers.enable \
            modules.ai.understand-anything.enable \
            modules.browsers.zen.enable \
            modules.shell.bookokrat.enable \
            modules.shell.claude-acp.enable \
            modules.packages.personalTools.enable; do
            val=$(nix eval ".#darwinConfigurations.mac-work.config.home-manager.users.katob.$opt" 2>/dev/null || echo "MISSING")
            if [ "$val" != "false" ]; then
              echo "::error title=work isolation::$opt is '$val' on mac-work (must be false)"
              fail=1
            else
              echo "OK: $opt = false"
            fi
          done
          echo "::endgroup::"

          echo "::group::package denylist"
          pkgs=$(nix eval ".#darwinConfigurations.mac-work.config.home-manager.users.katob.home.packages" \
                   --apply 'ps: builtins.concatStringsSep "\n" (map (p: p.pname or p.name) ps)' --raw)
          for bad in jobdrop zen-browser librewolf floorp thorium opencode kimi \
                     syncthing newsboat nmap taskwarrior bookokrat \
                     browserpass password-store; do
            if echo "$pkgs" | grep -qi "$bad"; then
              echo "::error title=work isolation::denylisted package matching '$bad' present on mac-work"
              fail=1
            fi
          done
          [ "$fail" = 0 ] && echo "package set clean"
          echo "::endgroup::"

          exit $fail
